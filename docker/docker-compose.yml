services:
  postgres:
    image: postgres:16
    container_name: museum-postgres
    environment:
      POSTGRES_DB: museum
      POSTGRES_USER: museum
      POSTGRES_PASSWORD: museum_dev
    ports:
      - "5432:5432"
    volumes:
      - museum_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U museum -d museum"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  museum_pg_data:
